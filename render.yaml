services:
  - type: psql
    name: nushare-db
    env: docker
    plan: free
    region: singapore

  - type: web
    name: nushare-backend
    env: go
    plan: free
    region: singapore
    buildCommand: cd backend && go build -o main ./cmd/server/main.go
    startCommand: cd backend && ./main
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: nushare-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: PORT
        value: 8080